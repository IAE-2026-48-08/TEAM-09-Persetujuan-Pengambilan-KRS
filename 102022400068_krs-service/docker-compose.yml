version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krs_service_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
    command: >
      sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
