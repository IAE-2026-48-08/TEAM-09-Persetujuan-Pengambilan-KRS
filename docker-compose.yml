version: '3.8'

services:
  # --- 1. SERVICE MATA KULIAH & KRS (Galih - NIM: 102022400068) ---
  krs-service:
    build:
      context: ./102022400068_krs-service
      dockerfile: Dockerfile
    container_name: krs_service_app
    restart: unless-stopped
    volumes:
      - ./102022400068_krs-service:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
      - MAHASISWA_SERVICE_URL=http://mahasiswa-service:8000/api
      - NILAI_SERVICE_URL=http://nilai-web/api
    command: >
      sh -c "composer install --no-interaction --optimize-autoloader && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - tubes-network

  # --- 2. SERVICE DATA MAHASISWA (Hans - NIM: 102022400280) ---
  mahasiswa-service:
    build:
      context: ./102022400280_Data_Mahasiswa_Service
      dockerfile: Dockerfile
    container_name: mahasiswa_service_app
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
    command: >
      sh -c "touch database/database.sqlite && php artisan key:generate && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - tubes-network

  # --- 3. SERVICE NILAI & KURIKULUM (Manhal - NIM: 102022400285) ---
  nilai-service:
    build:
      context: ./102022400285_grades-service
      target: runtime
    container_name: nilai_service_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./102022400285_grades-service:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: nilai-db
      DB_PORT: 3306
      DB_DATABASE: 102022400285_nilai_dan_kurikulum
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
    depends_on:
      - nilai-db
    networks:
      tubes-network:
        aliases:
          - app

  nilai-web:
    image: nginx:alpine
    container_name: nilai_service_web
    restart: unless-stopped
    volumes:
      - ./102022400285_grades-service:/var/www/html
      - ./102022400285_grades-service/.docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nilai-service
    networks:
      - tubes-network

  nilai-db:
    image: mysql:8.0
    container_name: nilai_service_db
    restart: unless-stopped
    ports:
      - "33063:3306"
    environment:
      MYSQL_DATABASE: 102022400285_nilai_dan_kurikulum
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - nilai_service_db_data:/var/lib/mysql
    networks:
      - tubes-network

  # --- 4. API GATEWAY ROUTING HUB (TEAM-09 - Port Laptop: 8000) ---
  api-gateway:
    image: nginx:alpine
    container_name: monorepo_api_gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - krs-service
      - mahasiswa-service
      - nilai-web
    networks:
      - tubes-network

volumes:
  nilai_service_db_data:
    driver: local

networks:
  tubes-network:
    driver: bridge
