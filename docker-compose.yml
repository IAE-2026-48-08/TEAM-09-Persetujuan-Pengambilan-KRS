version: '3.8'

services:
  # --- 1. SERVICE MATA KULIAH & KRS (Galih - Port Laptop: 8002) ---
  krs-service:
    build:
      context: ./102022400068_krs-service
      dockerfile: Dockerfile
    container_name: krs_service_app
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./102022400068_krs-service:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - DB_CONNECTION=sqlite
      - MAHASISWA_SERVICE_URL=http://mahasiswa-service/api
      - NILAI_SERVICE_URL=http://nilai-service/api
    command: >
      sh -c "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - tubes-network

  # --- 2. SERVICE DATA MAHASISWA (Hans - Port Laptop: 8001) ---
  mahasiswa-service:
    # build:
    #   context: ./1020224xxxxx_student-service
    #   dockerfile: Dockerfile
    image: alpine # temporary placeholder until folder exists
    container_name: mahasiswa_service_app
    restart: unless-stopped
    ports:
      - "8001:8000"
    networks:
      - tubes-network

  # --- 3. SERVICE NILAI & KURIKULUM (Manhal - Port Laptop: 8003) ---
  nilai-service:
    build:
      context: ./102022400285_grades-service
      target: runtime
    container_name: nilai_service_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./102022400285_grades-service:/var/www/html
      - ./102022400285_grades-service/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      DB_CONNECTION: mysql
      DB_HOST: nilai-db
      DB_PORT: 3306
      DB_DATABASE: 102022400285_nilai_dan_kurikulum
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
    depends_on:
      - nilai-db
    networks:
      - tubes-network

  nilai-web:
    image: nginx:alpine
    container_name: nilai_service_web
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - ./102022400285_grades-service:/var/www/html
      - ./102022400285_grades-service/.docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nilai-service
    networks:
      - tubes-network

  nilai-db:
    image: mysql:8.0
    container_name: nilai_service_db
    restart: unless-stopped
    ports:
      - "33063:3306"
    environment:
      MYSQL_DATABASE: 102022400285_nilai_dan_kurikulum
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - nilai_service_db_data:/var/lib/mysql
    networks:
      - tubes-network

volumes:
  nilai_service_db_data:
    driver: local

networks:
  tubes-network:
    driver: bridge
