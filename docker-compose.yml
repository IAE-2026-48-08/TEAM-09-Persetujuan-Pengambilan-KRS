version: '3.8'

services:
  # ----------------------------------------------------
  # Student Service (Hans)
  # ----------------------------------------------------
  student-service:
    build:
      context: ./102022400280_Data_Mahasiswa_Service
      dockerfile: Dockerfile
    container_name: student_service_app
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./102022400280_Data_Mahasiswa_Service:/app
      - /app/vendor
    environment:
      - APP_ENV=local
      - APP_KEY=base64:jAffLs/XwXF2fSDBrXKaDYXts+HTGeL7Np9aKqD5ido=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/app/database/database.sqlite
      - API_KEY=102022400280
    networks:
      team09_network:
        aliases:
          - student-service

  # ----------------------------------------------------
  # Grades Service (Manhal)
  # ----------------------------------------------------
  grades-service-db:
    image: mysql:8.0
    container_name: grades_service_db
    restart: unless-stopped
    ports:
      - "33069:3306"
    environment:
      MYSQL_DATABASE: 102022400285_nilai_dan_kurikulum
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - grades_db_data:/var/lib/mysql
    networks:
      - team09_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  grades-service-redis:
    image: redis:alpine
    container_name: grades_service_redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    networks:
      - team09_network

  grades-service-app:
    build:
      context: ./102022400285_grades-service
      target: runtime
    image: grades_service_runtime:latest
    container_name: grades_service_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./102022400285_grades-service:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:FPuUYowC5J9H6xNKi7rLMWN9/N5yTy9lmOAgrE3DZKg=
      DB_CONNECTION: mysql
      DB_HOST: grades-service-db
      DB_PORT: 3306
      DB_DATABASE: 102022400285_nilai_dan_kurikulum
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
      REDIS_HOST: grades-service-redis
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    depends_on:
      - grades-service-db
      - grades-service-redis
    networks:
      team09_network:
        aliases:
          - app

  grades-service:
    image: nginx:alpine
    container_name: grades_service_web
    restart: unless-stopped
    ports:
      - "8003:8000"
    volumes:
      - ./102022400285_grades-service:/var/www/html
      - ./102022400285_grades-service/.docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - grades-service-app
    networks:
      team09_network:
        aliases:
          - grades-service

  grades-service-queue:
    image: grades_service_runtime:latest
    container_name: grades_service_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - ./102022400285_grades-service:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:FPuUYowC5J9H6xNKi7rLMWN9/N5yTy9lmOAgrE3DZKg=
      DB_CONNECTION: mysql
      DB_HOST: grades-service-db
      DB_PORT: 3306
      DB_DATABASE: 102022400285_nilai_dan_kurikulum
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
      REDIS_HOST: grades-service-redis
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    depends_on:
      - grades-service-app
      - grades-service-db
      - grades-service-redis
    networks:
      - team09_network

  # ----------------------------------------------------
  # KRS Service (Galih)
  # ----------------------------------------------------
  krs-service:
    build:
      context: ./102022400068_krs-service
      dockerfile: Dockerfile
    container_name: krs_service_app
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./102022400068_krs-service:/var/www
    environment:
      - APP_ENV=local
      - APP_KEY=base64:jAffLs/XwXF2fSDBrXKaDYXts+HTGeL7Np9aKqD5ido=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
      - IAE_KEY=102022400068
      - IAE_SSO_URL=https://iae-sso.virtualfri.id
      - TEAM_ID=TEAM-09
      - MAHASISWA_SERVICE_URL=http://student-service:8000
      - NILAI_SERVICE_URL=http://grades-service:8000
    networks:
      - team09_network

  # ----------------------------------------------------
  # API Gateway (Galih)
  # ----------------------------------------------------
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api_gateway
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - student-service
      - krs-service
      - grades-service
    networks:
      team09_network:
        aliases:
          - api-gateway

networks:
  team09_network:
    driver: bridge

volumes:
  grades_db_data:
    driver: local
