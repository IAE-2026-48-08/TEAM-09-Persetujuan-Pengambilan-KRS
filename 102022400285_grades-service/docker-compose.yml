services:
  # ----------------------------------------------------
  # Laravel App Container (PHP-FPM)
  # ----------------------------------------------------
  app:
    build:
      context: .
      target: runtime
    container_name: nilai_kurikulum_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/public/build
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:FPuUYowC5J9H6xNKi7rLMWN9/N5yTy9lmOAgrE3DZKg=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: 102022400285_nilai_dan_kurikulum
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
      REDIS_HOST: redis
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    depends_on:
      - db
      - redis
    networks:
      - nilai_kurikulum_network

  # ----------------------------------------------------
  # Nginx Web Server Container
  # ----------------------------------------------------
  web:
    image: nginx:alpine
    container_name: nilai_kurikulum_web
    restart: unless-stopped
    ports:
      - "8003:80"
    volumes:
      - .:/var/www/html
      - .docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - nilai_kurikulum_network

  # ----------------------------------------------------
  # MySQL Database Container
  # ----------------------------------------------------
  db:
    image: mysql:8.0
    container_name: nilai_kurikulum_db
    restart: unless-stopped
    ports:
      - "33069:3306"
    environment:
      MYSQL_DATABASE: 102022400285_nilai_dan_kurikulum
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - nilai_kurikulum_db_data:/var/lib/mysql
    networks:
      - nilai_kurikulum_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # Redis Container
  # ----------------------------------------------------
  redis:
    image: redis:alpine
    container_name: nilai_kurikulum_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - nilai_kurikulum_network

  # ----------------------------------------------------
  # Laravel Queue Worker Container
  # ----------------------------------------------------
  queue:
    build:
      context: .
      target: runtime
    container_name: nilai_kurikulum_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/public/build
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_KEY: base64:FPuUYowC5J9H6xNKi7rLMWN9/N5yTy9lmOAgrE3DZKg=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: 102022400285_nilai_dan_kurikulum
      DB_USERNAME: laravel_user
      DB_PASSWORD: laravel_password
      REDIS_HOST: redis
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SESSION_DRIVER: database
    depends_on:
      - db
      - redis
    networks:
      - nilai_kurikulum_network

networks:
  nilai_kurikulum_network:
    driver: bridge

volumes:
  nilai_kurikulum_db_data:
    driver: local
